<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    .happy-dog { fill: #C89F7E; }
    .suitcase { fill: #F28C28; }
    .airplane { fill: #A4D65E; }
    .text { font-family: 'Arial'; font-size: 40px; fill: #000; }
  </style>
  <g>
    <!-- Happy Dog -->
    <polygon class="happy-dog" points="100,200 120,150 160,150 180,200 160,250 120,250" />
    <circle class="happy-dog" cx="140" cy="150" r="20" />
    <circle cx="130" cy="145" r="5" fill="#000" />
    <circle cx="150" cy="145" r="5" fill="#000" />
    <path fill="#000" d="M 135 160 Q 140 170, 145 160" />
    
    <!-- Suitcase -->
    <rect class="suitcase" x="220" y="200" width="100" height="80" rx="10" />
    <rect x="250" y="180" width="20" height="20" fill="#333" />
    
    <!-- Airplane -->
    <polygon class="airplane" points="400,200 450,175 460,200 450,225" />
    <polygon class="airplane" points="420,210 450,200 430,190" />
    
    <!-- Text -->
    <text class="text" x="100" y="370">Paws on the Go Pet Care</text>
  </g>
</svg>
